# Gold-traces machine config (managed by the appmap-gold-traces skill).
#
# This file holds the project-specific commands and paths the engine needs.
# The curated recording list lives next to it in appmap_golden_set.yaml.
#
# YAML notes: this file is read by a minimal parser. Use block maps/lists only
# (no flow collections or anchors). Do not put `#` comments on the same line as
# a value. Quote any value that contains a colon-followed-by-space.

schema_version: 1

# Working directory where the record + appmap commands run, relative to the
# project root (where you invoke the engine). Use "." if commands run at the
# repo root. Example: a Python server living under server/ uses "server".
cwd: .

# AppMap output directory, relative to `cwd`. Recordings are read from
# <cwd>/<appmap_dir>/<appmap_path>, where <appmap_path> comes from each
# manifest entry. Must match the `appmap_dir` in the project's appmap.yml.
appmap_dir: tmp/appmap

commands:
  # Command template that (re-)records ONE golden test. Run via the shell in
  # `cwd` when --record is passed. Placeholders are substituted per entry:
  #   {test_file}   the entry's test_file (as written in the manifest)
  #   {test_name}   the entry's test_name
  #   {appmap_path} the entry's appmap_path
  # Pick the line for your stack and delete the rest (these are examples):
  #
  #   pytest (appmap-python):
  #     record: ".venv/bin/appmap-python pytest {test_file}::{test_name} -q"
  #   minitest / Ruby (appmap-ruby): record a single test by name
  #     record: "bundle exec ruby -Itest {test_file} -n {test_name}"
  #   rspec (appmap-ruby):
  #     record: "APPMAP=true bundle exec rspec {test_file} -e {test_name}"
  #   jest (appmap-node):
  #     record: "npx appmap-node npx jest {test_file} -t {test_name}"
  #   mocha (appmap-node):
  #     record: "npx appmap-node npx mocha {test_file} --grep {test_name}"
  record: ".venv/bin/appmap-python pytest {test_file}::{test_name} -q"

  # Extra environment variables for the record command (optional). Some
  # recorders need a flag to switch on, or to capture parameter values.
  record_env:
    APPMAP_DISPLAY_PARAMS: "true"

  # The AppMap CLI used to export sequence diagrams and diff them for comparison.
  # May include a runner prefix, e.g. "npx @appland/appmap". Defaults to "appmap".
  # Compare reads per-action `labels` from the diagram (for security severity), so
  # the CLI must be a version that emits them in `sequence-diagram --format json`.
  appmap_cli: appmap

# Optional. Package code-object ids to render at function granularity in the
# diagram (passed as --expand to the CLI). Package granularity is enough for
# DETECTION — every recorded function is still a node, so its change is caught —
# so leave this empty unless you want a security-critical package broken out into
# per-function swimlanes in the diff. Example:
# expand:
#   - "package:nova_server/graphql"
